# iter 139 — syntax + structure smoke for the @metaharness/* example packages.
#
# Each examples-packages/<name>/ is a thin wrapper that runs
# `npx metaharness@latest <name> --template <X> --host <Y>`. This guard
# verifies, on every push that touches them, that:
#   - package.json parses and declares a string bin
#   - bin/scaffold.mjs is syntactically valid (node --check)
#   - README.md + LICENSE are present
# It does NOT run a real scaffold (that's covered by published-smoke.yml
# once these are published) — this is the cheap per-push structural gate.

name: examples-packages-smoke

on:
  push:
    branches: [main]
    paths:
      - 'examples-packages/**'
      - '.github/workflows/examples-packages-smoke.yml'
  pull_request:
    paths:
      - 'examples-packages/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Structure + syntax check every example package
        shell: bash
        run: |
          fail=0
          count=0
          for d in examples-packages/*/; do
            name=$(basename "$d")
            count=$((count + 1))
            # package.json parses + has a string bin pointing at the scaffold
            if ! node -e "
              const p = require('./$d/package.json');
              if (typeof p.bin !== 'string') { console.error('$name: bin must be a string'); process.exit(1); }
              if (!p.name.startsWith('@metaharness/')) { console.error('$name: wrong scope'); process.exit(1); }
              if (!Array.isArray(p.files) || !p.files.includes('bin/**')) { console.error('$name: files missing bin'); process.exit(1); }
            "; then fail=1; fi
            # bin is syntactically valid
            if ! node --check "$d/bin/scaffold.mjs"; then echo "$name: bin syntax error"; fail=1; fi
            # README + LICENSE present
            test -f "$d/README.md" || { echo "$name: missing README.md"; fail=1; }
            test -f "$d/LICENSE"   || { echo "$name: missing LICENSE"; fail=1; }
          done
          echo ""
          echo "Checked $count example packages."
          if [ "$fail" -ne 0 ]; then echo "FAIL: structural issues above"; exit 1; fi
          echo "PASS: all example packages structurally valid."
